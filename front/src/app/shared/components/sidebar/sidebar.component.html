<nav class="barra-superior">
  <div class="seccio-esquerra">
    <div class="logo">
      <!-- Espai per logotip si cal -->
    </div>

    <div class="enllacos-navegacio">
      <!-- Icona Inici -->
      <a routerLink="/professors" routerLinkActive="actiu" [routerLinkActiveOptions]="{ exact: true }"
        class="element-navegacio">
        <div class="caixa-icona">
          <img src="/img/menu/iconos/inici-icona.png" alt="Inici" />
        </div>
      </a>

      <!-- Icona Llista / Alumnes -->
      <a routerLink="/llista-classe" routerLinkActive="actiu" class="element-navegacio">
        <div class="caixa-icona">
          <img src="/img/menu/iconos/llista-icona.png" alt="Llista" />
        </div>
      </a>

      <!-- Icona Calendari -->
      <a routerLink="/professors" class="element-navegacio">
        <div class="caixa-icona">
          <img src="/img/menu/iconos/calendari-icona.png" alt="Calendari" />
        </div>
      </a>

      <!-- Icona Documents / Justificants -->
      <a routerLink="/professors" class="element-navegacio">
        <div class="caixa-icona">
          <img src="/img/menu/iconos/justif-icona.png" alt="Justificants" />
        </div>
      </a>

      <a routerLink="/llista-assignatures" class="element-navegacio">
        <div class="caixa-icona">
          <img src="/img/menu/iconos/assignatures-icona.png" alt="Assignatures" />
        </div>
      </a>

      <a routerLink="/llista-faltes" class="element-navegacio">
        <div class="caixa-icona">
          <img src="/img/menu/iconos/rellotge-icona.png" alt="Faltes" />
        </div>
      </a>

      <!-- Opcions exclusives de Tutor -->
      @if (esTutor) {
      <a routerLink="/gestio-inscrits" class="element-navegacio">
        <div class="caixa-icona"
          style="background-color: rgba(99, 102, 241, 0.1); border: 1px dashed rgba(99, 102, 241, 0.5);">
          <img src="/img/menu/iconos/justif-icona.png" alt="Gestió Inscrits" style="opacity: 0.8;" />
        </div>
      </a>

      <a routerLink="/horari-alumnes" class="element-navegacio">
        <div class="caixa-icona"
          style="background-color: rgba(99, 102, 241, 0.1); border: 1px dashed rgba(99, 102, 241, 0.5);">
          <img src="/img/menu/iconos/calendari-icona.png" alt="Horari Alumnes" style="opacity: 0.8;" />
        </div>
      </a>
      }
    </div>
  </div>

  <!-- Icona Perfil -->
  <div class="seccio-perfil">
    <a routerLink="/profile" class="element-navegacio">
      <div class="caixa-icona perfil">
        <img src="/img/menu/iconos/usuari-icona.png" alt="Perfil" />
      </div>
    </a>
  </div>
</nav>
