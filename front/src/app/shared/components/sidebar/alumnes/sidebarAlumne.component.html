<nav class="barra-superior">
  <div class="contenedor-navegacio-centrat">
    <!-- Icona Inici -->
    <a routerLink="/alumnes" routerLinkActive="actiu" [routerLinkActiveOptions]="{ exact: true }"
      class="element-navegacio">
      <div class="caixa-icona">
        <img src="/img/menu/iconos/inici-icona.png" alt="Inici" />
      </div>
    </a>

    <!-- Icona Horari -->
    <a routerLink="/alumnes/horaris" routerLinkActive="actiu" class="element-navegacio">
      <div class="caixa-icona">
        <img src="/img/menu/iconos/calendari-icona.png" alt="Horari" />
      </div>
    </a>

    <!-- Icona Perfil -->
    <a routerLink="/alumnes/perfil" routerLinkActive="actiu" class="element-navegacio">
      <div class="caixa-icona">
        <img src="/img/menu/iconos/usuari-icona.png" alt="Perfil" />
      </div>
    </a>

    <!-- Icona Sortir -->
    <a (click)="logout()" class="element-navegacio logout-btn">
      <div class="caixa-icona">
        <img src="/img/menu/iconos/rellotge-icona.png" alt="Sortir"
          style="filter: grayscale(1) invert(0.5) sepia(1) hue-rotate(320deg) saturate(5);" />
      </div>
    </a>
  </div>
</nav>
