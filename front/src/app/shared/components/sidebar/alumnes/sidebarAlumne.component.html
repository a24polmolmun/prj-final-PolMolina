      routerLink="/alumnes"
      routerLinkActive="actiu"
      [routerLinkActiveOptions]="{ exact: true }"
      class="element-navegacio"
    >
      <div class="caixa-icona">
        <img src="/img/menu/iconos/inici-icona.png" alt="Inici" />

    <!-- Icona Horari -->
    <a routerLink="/alumnes/horaris" routerLinkActive="actiu" class="element-navegacio">

      </div>
    </a>

    <!-- Icona Perfil -->
    <a routerLink="/profile" routerLinkActive="actiu" class="element-navegacio">
