<div class="fons-login">
    <!-- Banner Superior -->
    <a href="https://dotacio.domini.cat" target="_blank" class="banner-horizontal banner-superior">
        <div class="banner-contingut">
            <span class="etiqueta">PATROCINADOR</span>
            <span class="separador">|</span>
            <span class="titol">Col·labora amb el projecte <strong>Dotació Domini</strong></span>
            <span class="enllaç-text">Visitar web →</span>
        </div>
    </a>

    <div class="targeta-login">
        <div class="encapçalament-login">
            <img src="/assets/EduPass.png" alt="EduPass Logo" class="login-logo" />
            <h1>Iniciar Sessió</h1>
            <p>Accedeix al teu espai educatiu</p>
        </div>

        <div class="cos-formulari">
            <div class="grup-input">
                <label for="usuari">Email</label>
                <div class="input-wrapper">
                    <span class="material-icons">person</span>
                    <input type="text" id="usuari" placeholder="usuari@exemple.com" [(ngModel)]="usuari" (keyup.enter)="iniciarSessio()">
                </div>
            </div>

            <div class="grup-input">
                <label for="password">Contrasenya</label>
                <div class="input-wrapper">
                    <span class="material-icons">lock</span>
                    <input type="password" id="password" placeholder="••••••••" [(ngModel)]="password" (keyup.enter)="iniciarSessio()">
                </div>
            </div>

            <button (click)="iniciarSessio()" class="boto-entrar">
                Entrar al sistema
            </button>

            @if (error()) {
            <div class="missatge-error">
                <span class="material-icons">error_outline</span>
                {{ error() }}
            </div>
            }
        </div>

        <div class="peu-login">
            <p>© 2026 EduPass • Sistema de Gestió Acadèmica</p>
        </div>
    </div>

    <!-- Banner Inferior -->
    <a href="https://www.cdmon.com" target="_blank" class="banner-horizontal banner-inferior">
        <div class="banner-contingut">
            <span class="etiqueta">HOSTING</span>
            <span class="separador">|</span>
            <span class="titol">Projecte allotjat amb la tecnologia de <strong>CDMon</strong></span>
            <span class="enllaç-text">Més informació →</span>
        </div>
    </a>
</div>
